name: Deploy to GitHub Pages

# Build the site and publish it to GitHub Pages on every push to main.
# Pages must be set to "GitHub Actions" as its source (Settings -> Pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege for the deploy: read the code, write Pages, mint the OIDC
# token the deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; do not cancel an in-progress one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
