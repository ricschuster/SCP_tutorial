version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      dev-dependencies:
        dependency-type: development
    # Hold the TypeScript major: typescript-eslint does not yet support TS 7, so
    # the major bump breaks the lint/typecheck gate. Remove this once the
    # ecosystem supports TypeScript 7.
    ignore:
      - dependency-name: typescript
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
